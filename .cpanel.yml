---
deployment:
  tasks:
    # 1. Deploy files to public_html (uses $HOME which works on /home/ and /home2/ servers)
    - export DEPLOYPATH=$HOME/public_html
    - /bin/cp -rf . $DEPLOYPATH

    # 2. Install PHP dependencies (no dev, optimized autoloader)
    - /usr/local/bin/php $DEPLOYPATH/vendor/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --working-dir=$DEPLOYPATH 2>/dev/null || /usr/local/bin/php /usr/local/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --working-dir=$DEPLOYPATH 2>/dev/null || true

    # 3. Run new database migrations (safe — only adds new tables)
    - /usr/local/bin/php $DEPLOYPATH/artisan migrate --force --no-interaction

    # 4. Seed navigation items (firstOrCreate — safe to re-run)
    - /usr/local/bin/php $DEPLOYPATH/artisan db:seed --class=NavItemSeeder --force --no-interaction

    # 5. Clear all caches
    - /usr/local/bin/php $DEPLOYPATH/artisan config:clear
    - /usr/local/bin/php $DEPLOYPATH/artisan route:clear
    - /usr/local/bin/php $DEPLOYPATH/artisan view:clear
    - /usr/local/bin/php $DEPLOYPATH/artisan cache:clear

    # 6. Rebuild config + route cache for production speed
    - /usr/local/bin/php $DEPLOYPATH/artisan config:cache
    - /usr/local/bin/php $DEPLOYPATH/artisan route:cache

    # 7. Storage symlink (idempotent)
    - /usr/local/bin/php $DEPLOYPATH/artisan storage:link --force 2>/dev/null || true

    # 8. Fix permissions
    - chmod -R 755 $DEPLOYPATH/storage
    - chmod -R 755 $DEPLOYPATH/bootstrap/cache
